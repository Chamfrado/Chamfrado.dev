<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Purple arcade ghost favicon">
  <defs>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2.2" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0.65 0 0 0 0.55  0 0.2 0 0 0  0.95 0 1 0 1  0 0 0 0.8 0" result="purpleGlow"/>
      <feMerge>
        <feMergeNode in="purpleGlow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="body" x1="16" y1="8" x2="48" y2="58" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#C084FC"/>
      <stop offset="0.5" stop-color="#A855F7"/>
      <stop offset="1" stop-color="#6D28D9"/>
    </linearGradient>
  </defs>

  <rect width="64" height="64" rx="12" fill="#07030E"/>

  <!-- arcade ghost body -->
  <path filter="url(#glow)" d="M12 56V27C12 16.5 20.5 8 32 8s20 8.5 20 19v29l-6-5-6 5-6-5-6 5-6-5-6 5Z" fill="url(#body)" stroke="#E9D5FF" stroke-width="2" stroke-linejoin="round"/>

  <!-- pixel highlights -->
  <rect x="23" y="13" width="8" height="5" fill="#E9D5FF" opacity="0.38"/>
  <rect x="35" y="17" width="7" height="4" fill="#F0ABFC" opacity="0.45"/>
  <rect x="17" y="31" width="5" height="8" fill="#C084FC" opacity="0.4"/>
  <rect x="43" y="34" width="4" height="7" fill="#7DD3FC" opacity="0.28"/>

  <!-- eyes -->
  <g>
    <rect x="20" y="25" width="10" height="12" rx="2" fill="#22D3EE"/>
    <rect x="34" y="25" width="10" height="12" rx="2" fill="#22D3EE"/>
    <rect x="24" y="27" width="4" height="6" fill="#FFFFFF" opacity="0.9"/>
    <rect x="38" y="27" width="4" height="6" fill="#FFFFFF" opacity="0.9"/>
  </g>

  <!-- small shadow pixels -->
  <rect x="16" y="47" width="5" height="4" fill="#4C1D95" opacity="0.55"/>
  <rect x="30" y="48" width="5" height="4" fill="#4C1D95" opacity="0.45"/>
  <rect x="44" y="47" width="4" height="4" fill="#4C1D95" opacity="0.55"/>
</svg>
